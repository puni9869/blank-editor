name: Deploy static content to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Get project version
        id: version
        run: |
          echo "PROJECT_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV
          echo "Project version: $PROJECT_VERSION"

      - name: Install dependencies
        run: npm i pnpm --global && corepack enable pnpm && pnpm install

      - name: Build
        run: pnpm run build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployed version
        run: echo "Deployed Blank Editor version $PROJECT_VERSION to GitHub Pages"
